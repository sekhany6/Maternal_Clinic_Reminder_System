<!DOCTYPE html>
<html>
<head>
    <title>Clinic Reminder</title>
    <link rel="icon" type="image/png" href="../images/remindericon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<header>    
 <nav> 
    <a href="index.html">Logout</a>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="dashboard.html">Dashboard</a>
 </nav>
</header>
<body>
<h2>Sent Vaccination Reminders</h2>

<div class="reminders-container" style="padding: 20px; max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div>
        <h3 style="background-color: #FF9800; color: white; padding: 10px; border-radius: 4px;">Pending Vaccinations with Sent Reminders</h3>
        <table border="1" width="100%" style="margin-top: 10px;">
            <thead>
                <tr>
                    <th>Baby</th>
                    <th>Mother</th>
                    <th>Vaccine</th>
                    <th>Phone</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="pendingReminderTable"></tbody>
        </table>
        <div id="pendingNoData" style="text-align: center; padding: 20px; color: #999; display: none;">
            No pending vaccinations with sent reminders
        </div>
    </div>

    <div>
        <h3 style="background-color: #4CAF50; color: white; padding: 10px; border-radius: 4px;">Completed Vaccinations</h3>
        <table border="1" width="100%" style="margin-top: 10px;">
            <thead>
                <tr>
                    <th>Baby</th>
                    <th>Mother</th>
                    <th>Vaccine</th>
                    <th>Phone</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="completedReminderTable"></tbody>
        </table>
        <div id="completedNoData" style="text-align: center; padding: 20px; color: #999; display: none;">
            No completed vaccinations
        </div>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
