<!DOCTYPE html>
<html>
<head>
    <title>Child Vaccination Schedule - Clinic Reminder</title>
    <link rel="icon" type="image/png" href="../images/remindericon.png">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .schedule-container {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .schedule-header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .schedule-header h2 {
            margin: 0;
        }
        .tables-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        .table-wrapper {
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        .table-title {
            padding: 12px 15px;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }
        .table-title.pending {
            background-color: #FF9800;
        }
        .table-title.completed {
            background-color: #4CAF50;
        }
        .vaccination-table {
            width: 100%;
            border-collapse: collapse;
        }
        .vaccination-table th {
            background-color: #f5f5f5;
            border-bottom: 2px solid #ddd;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        .vaccination-table td {
            border-bottom: 1px solid #ddd;
            padding: 12px;
        }
        .vaccination-table tr:hover {
            background-color: #f9f9f9;
        }
        .complete-btn {
            background-color: #2196F3;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .complete-btn:hover {
            background-color: #0b7dda;
        }
        .complete-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .no-data {
            text-align: center;
            padding: 20px;
            color: #999;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
        .alert {
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            animation: slideIn 0.3s ease-in-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #666;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .back-button:hover {
            background-color: #555;
        }
    </style>
</head>
<header>    
    <nav> 
        <a href="index.html">Logout</a>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="dashboard.html">Dashboard</a>
    </nav>
</header>
<body>
<div class="schedule-container">
    <button type="button" class="back-button" onclick="window.history.back()">← Back to Dashboard</button>
    
    <div class="schedule-header">
        <h2 id="babyNameHeader">Loading...</h2>
    </div>

    <div id="alertContainer"></div>

    <div class="tables-section">
        <!-- Pending Vaccinations Table -->
        <div class="table-wrapper">
            <div class="table-title pending">Pending Vaccinations</div>
            <table class="vaccination-table" id="pendingTable">
                <thead>
                    <tr>
                        <th>Vaccine</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pendingTableBody">
                    <tr class="loading"><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
            <div id="pendingNoData" class="no-data" style="display:none;">No pending vaccinations</div>
        </div>

        <!-- Completed Vaccinations Table -->
        <div class="table-wrapper">
            <div class="table-title completed">Completed Vaccinations</div>
            <table class="vaccination-table" id="completedTable">
                <thead>
                    <tr>
                        <th>Vaccine</th>
                        <th>Due Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="completedTableBody">
                    <tr class="loading"><td colspan="3">Loading...</td></tr>
                </tbody>
            </table>
            <div id="completedNoData" class="no-data" style="display:none;">No completed vaccinations</div>
        </div>
    </div>
</div>

<script src="js/schedule-child.js"></script>
</body>
</html>
